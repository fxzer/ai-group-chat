<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="appName"></title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="page-layout">

    <!-- 主内容区域 -->
    <main class="main-content">
      <div class="container">

        <!-- Tab 导航 -->
        <div class="tab-nav">
          <button class="tab-link active" data-tab="prompt-templates" data-i18n="promptTemplatesTitle">提示词管理</button>
          <button class="tab-link" data-tab="summary-settings" data-i18n="summarySettingsTitle">AI 总结设置</button>
        </div>

        <!-- 提示词模板管理 -->
        <section id="prompt-templates" class="settings-section tab-content active">
          <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0;" data-i18n="promptTemplatesTitle">提示词管理</h1>
            <button id="addTemplateBtn" class="add-template-btn" style="
              background: #00a240;
              color: white;
              border: none;
              padding: 10px 20px;
              border-radius: 6px;
              cursor: pointer;
              font-size: 14px;
              display: flex;
              align-items: center;
              gap: 5px;
            ">
              <span>+ </span><span data-i18n="addTemplateButton">添加</span>
            </button>
          </div>
          <div class="prompt-templates-section">

            <!-- 模板列表 -->
            <div id="templatesList" class="templates-list">
              <!-- 模板项将动态生成 -->
            </div>

            <!-- 添加/编辑模板对话框 -->
            <div id="templateDialog" class="template-dialog" style="display: none;">
              <div class="dialog-overlay" id="dialogOverlay" style="
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                z-index: 1000;
              "></div>
              <div class="dialog-content" style="
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: white;
                border-radius: 12px;
                padding: 0;
                max-width: 500px;
                width: 90%;
                z-index: 1001;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
              ">
                <div class="dialog-header" style="
                  padding: 20px 24px 16px;
                  border-bottom: 1px solid #eee;
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                ">
                  <h3 id="dialogTitle" data-i18n="addTemplateTitle" style="margin: 0; font-size: 18px;">添加提示词模板</h3>
                  <button class="dialog-close" id="dialogClose" style="
                    background: none;
                    border: none;
                    font-size: 20px;
                    cursor: pointer;
                    color: #999;
                    width: 24px;
                    height: 24px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  ">×</button>
                </div>
                <div class="dialog-body" style="padding: 24px;">
                  <div class="form-group" style="margin-bottom: 20px;">
                    <div class="input-wrapper">
                      <input type="text" id="templateName" data-i18n-placeholder="templateNamePlaceholder" placeholder="模板名称 (例如：精简卡片)" maxlength="20" style="
                        width: 100%;
                        padding: 10px 32px 10px 12px;
                        border: 1px solid #ddd;
                        border-radius: 6px;
                        font-size: 14px;
                        box-sizing: border-box;
                      ">
                      <button id="clearNameBtn" class="clear-btn" type="button" title="清空">&times;</button>
                    </div>
                  </div>
                  
                  <div class="form-group" style="margin-bottom: 4px;">
                    <div class="input-wrapper textarea-wrapper">
                      <textarea id="templateQuery" data-i18n-placeholder="templateQueryPlaceholder" placeholder="查询模板 (支持多行，必须包含 {query} 作为输入占位符。例如：&#10;导致失败的原因:「{query}」)" rows="10" style="
                        width: 100%;
                        padding: 10px 32px 10px 12px;
                        border: 1px solid #ddd;
                        border-radius: 6px;
                        font-size: 14px;
                        box-sizing: border-box;
                        resize: vertical;
                        font-family: inherit;
                        min-height: 220px;
                        line-height: 1.5;
                      "></textarea>
                      <button id="clearQueryBtn" class="clear-btn" type="button" title="清空">&times;</button>
                    </div>
                  </div>
                </div>
                <div class="dialog-footer" style="
                  padding: 16px 24px 20px;
                  border-top: 1px solid #eee;
                  display: flex;
                  justify-content: flex-end;
                  gap: 12px;
                ">
                  <button id="cancelTemplate" class="btn-secondary" data-i18n="cancelButton" style="
                    background: #f5f5f5;
                    color: #666;
                    border: 1px solid #ddd;
                    padding: 8px 16px;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 14px;
                  ">取消</button>
                  <button id="saveTemplate" class="btn-primary" data-i18n="saveButton" style="
                    background: #00a240;
                    color: white;
                    border: none;
                    padding: 8px 16px;
                    border-radius: 4px;
                    cursor: pointer;
                    font-size: 14px;
                  ">保存</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- AI 总结设置 -->
        <section id="summary-settings" class="settings-section tab-content">
          <div class="section-header" style="margin-bottom: 20px;">
            <h1 style="margin: 0;" data-i18n="summarySettingsTitle">AI 总结设置</h1>
          </div>

          <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px;" data-i18n="summaryApiUrlLabel">API 接口地址</label>
            <input type="text" id="summaryApiUrl" placeholder="https://api.deepseek.com/v1" style="
              width: 100%;
              padding: 10px 12px;
              border: 1px solid #ddd;
              border-radius: 6px;
              font-size: 14px;
              box-sizing: border-box;
            ">
          </div>
          <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px;" data-i18n="summaryApiKeyLabel">API Key</label>
            <input type="password" id="summaryApiKey" placeholder="sk-..." style="
              width: 100%;
              padding: 10px 12px;
              border: 1px solid #ddd;
              border-radius: 6px;
              font-size: 14px;
              box-sizing: border-box;
            ">
          </div>
          <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px;" data-i18n="summaryApiModelLabel">API 模型名称</label>
            <input type="text" id="summaryApiModel" placeholder="deepseek-chat" style="
              width: 100%;
              padding: 10px 12px;
              border: 1px solid #ddd;
              border-radius: 6px;
              font-size: 14px;
              box-sizing: border-box;
            ">
          </div>
          <div class="form-group" style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px;" data-i18n="summaryApiPromptLabel">系统提示词</label>
            <textarea id="summaryApiPrompt" placeholder="你是一个优秀的AI总结和对比助手。请总结以下所有 AI 的回答要点，对比它们的分歧与共识，提取出核心结论，并输出一份精美的 Markdown 报告。" rows="5" style="
              width: 100%;
              padding: 10px 12px;
              border: 1px solid #ddd;
              border-radius: 6px;
              font-size: 14px;
              box-sizing: border-box;
              font-family: inherit;
              resize: vertical;
              line-height: 1.5;
            "></textarea>
          </div>
          <div style="display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 20px;">
            <span id="testSummaryApiResult" style="font-size: 13px; font-weight: 500; display: none;"></span>
            <button id="testSummarySettings" class="btn-secondary" style="
              background: #f5f5f5;
              color: #333;
              border: 1px solid #ddd;
              padding: 10px 20px;
              border-radius: 6px;
              cursor: pointer;
              font-size: 14px;
              font-weight: 500;
              transition: all 0.2s;
            " data-i18n="summaryApiTestBtn">测试连接</button>
            <button id="saveSummarySettings" class="btn-primary" style="
              background: #00a240;
              color: white;
              border: none;
              padding: 10px 24px;
              border-radius: 6px;
              cursor: pointer;
              font-size: 14px;
              font-weight: 500;
              transition: background 0.2s;
            " data-i18n="saveFavoriteSites">保存</button>
          </div>
        </section>
        
      </div>
    </main>
  </div>
  
  <!-- Toast提示 -->
  <div id="toast" class="toast"></div>

    <script src="../config/baseConfig.js"></script>
  <script src="options.js"></script>
</body>
</html>
